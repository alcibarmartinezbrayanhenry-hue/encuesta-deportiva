<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta Deportiva | Brayan Alcibar</title>
    <style>
        :root {
            --grass-green: #1a472a;
            --field-line: rgba(255, 255, 255, 0.2);
            --madrid-color: #3a86ff;
            --barca-color: #a70032;
            --gold: #ffd700;
        }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #2d5a27 0%, #1a3a16 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .stadium-card {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }
        h1 { 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--gold); 
            margin-bottom: 5px;
        }
        .subtitle { 
            text-align: center; 
            font-size: 0.95em; 
            opacity: 0.8; 
            margin-bottom: 25px; 
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, input[type="number"] {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #444;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }
        .teams-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-top: 10px; 
        }
        .team-option {
            border: 2px solid #444;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .team-option:hover { background: rgba(255,255,255,0.05); }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .team-option.madrid { 
            border-color: var(--madrid-color); 
            background: rgba(58, 134, 255, 0.25); 
        }
        input[type="radio"]:checked + .team-option.barca { 
            border-color: var(--barca-color); 
            background: rgba(167, 0, 50, 0.25); 
        }
        .error-msg { 
            color: #ff4d4d; 
            font-size: 0.85em; 
            margin-top: 5px; 
            display: none; 
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
            font-size: 1.1em;
        }
        button:disabled { 
            background: #333; 
            color: #777; 
            cursor: not-allowed; 
        }
        button:enabled { 
            background: var(--gold); 
            color: black; 
            box-shadow: 0 0 15px var(--gold); 
        }
        .chart-container { 
            margin-top: 40px; 
            border-top: 1px solid #333; 
            padding-top: 20px; 
        }
        .bar-wrapper { margin-bottom: 15px; }
        .bar-label { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 5px; 
            font-weight: 600;
        }
        .bar-bg { 
            background: #222; 
            border-radius: 10px; 
            height: 28px; 
            overflow: hidden; 
        }
        .bar-fill { 
            height: 100%; 
            width: 0%; 
            transition: width 1s ease-out; 
        }
        .signature { 
            text-align: center; 
            margin-top: 30px; 
            font-size: 0.85em; 
            color: var(--gold); 
            opacity: 0.7; 
        }
    </style>
</head>
<body>
<div class="stadium-card">
    <h1>¿Qué equipo prefieres?</h1>
    <p class="subtitle">Por favor complete todos los campos para votar</p>
    
    <form id="surveyForm">
        <div class="form-group">
            <label>¿Cuál es tu nombre? *</label>
            <input type="text" id="name" placeholder="Nombre y apellido" autocomplete="off" required>
            <div id="nameError" class="error-msg">Ingrese solo letras y espacios</div>
        </div>
        
        <div class="form-group">
            <label>¿Cuántos años tienes? *</label>
            <input type="text" id="age" placeholder="Edad" inputmode="numeric" autocomplete="off" required>
            <div id="ageError" class="error-msg">Ingrese solo números</div>
        </div>
        
        <div class="form-group">
            <label>¿Qué equipo prefieres? *</label>
            <div class="teams-grid">
                <label>
                    <input type="radio" name="team" value="madrid" required>
                    <div class="team-option madrid">Real Madrid</div>
                </label>
                <label>
                    <input type="radio" name="team" value="barca" required>
                    <div class="team-option barca">Barcelona</div>
                </label>
            </div>
        </div>

        <button type="submit" id="submitBtn" disabled>Enviar Voto</button>
    </form>

    <div class="chart-container">
        <h3>Marcador en Vivo</h3>
        <div class="bar-wrapper">
            <div class="bar-label"><span>Real Madrid</span> <span id="countMadrid">0</span></div>
            <div class="bar-bg"><div id="barMadrid" class="bar-fill" style="background: var(--madrid-color);"></div></div>
        </div>
        <div class="bar-wrapper">
            <div class="bar-label"><span>Barcelona</span> <span id="countBarca">0</span></div>
            <div class="bar-bg"><div id="barBarca" class="bar-fill" style="background: var(--barca-color);"></div></div>
        </div>
    </div>
    
    <div class="signature">Encuesta elaborada por Brayan Alcibar</div>
</div>

<!-- Firebase SDK -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ==================== CONFIGURACIÓN FIREBASE ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDCnn6zskVJeUUn5N9VKfk9eFdKz94DZdw",
        authDomain: "encuesta-deportiva-d8e8a.firebaseapp.com",
        projectId: "encuesta-deportiva-d8e8a",
        storageBucket: "encuesta-deportiva-d8e8a.appspot.com",
        messagingSenderId: "518624866592",
        appId: "1:518624866592:web:a11bcb4299f7366b1c2745"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const encuestasRef = collection(db, "votos_deportivos");

    // ==================== ESCUCHA EN TIEMPO REAL ====================
    let votes = { madrid: 0, barca: 0 };

    onSnapshot(encuestasRef, (snapshot) => {
        votes = { madrid: 0, barca: 0 };
        
        snapshot.docs.forEach(doc => {
            const data = doc.data();
            if (data.equipo === "madrid") votes.madrid++;
            if (data.equipo === "barca") votes.barca++;
        });

        updateChart();
    });

    // ==================== FUNCIONES ====================
    function updateChart() {
        const total = votes.madrid + votes.barca;
        const pMadrid = total === 0 ? 0 : (votes.madrid / total) * 100;
        const pBarca = total === 0 ? 0 : (votes.barca / total) * 100;

        document.getElementById('barMadrid').style.width = pMadrid + '%';
        document.getElementById('barBarca').style.width = pBarca + '%';
        document.getElementById('countMadrid').innerText = votes.madrid;
        document.getElementById('countBarca').innerText = votes.barca;
    }

    // ==================== ENVÍO DEL FORMULARIO ====================
    const form = document.getElementById('surveyForm');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('name').value.trim();
        const age = document.getElementById('age').value.trim();
        const team = document.querySelector('input[name="team"]:checked').value;

        submitBtn.disabled = true;
        submitBtn.textContent = "Enviando...";

        try {
            await addDoc(encuestasRef, {
                nombre: name,
                edad: parseInt(age),
                equipo: team,
                fecha: new Date()
            });

            alert("¡Voto registrado con éxito! ⚽");
            form.reset();
            validateForm();
        } catch (error) {
            console.error("Error:", error);
            alert("Hubo un error al enviar tu voto. Inténtalo de nuevo.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Enviar Voto";
        }
    });

    // Validación en tiempo real
    function validateForm() {
        const nameVal = document.getElementById('name').value.trim();
        const ageVal = document.getElementById('age').value.trim();
        const teamSelected = document.querySelector('input[name="team"]:checked');

        const isNameValid = /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/.test(nameVal) && nameVal.length >= 3;
        const isAgeValid = /^[0-9]+$/.test(ageVal) && parseInt(ageVal) >= 5 && parseInt(ageVal) <= 100;

        document.getElementById('nameError').style.display = (nameVal && !isNameValid) ? 'block' : 'none';
        document.getElementById('ageError').style.display = (ageVal && !isAgeValid) ? 'block' : 'none';

        submitBtn.disabled = !(isNameValid && isAgeValid && teamSelected);
    }

    form.addEventListener('input', validateForm);
    form.addEventListener('change', validateForm);

    // Inicializar
    updateChart();
</script>
</body>
</html>
